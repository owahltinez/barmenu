name: Old Fashioned
description: For the classy whiskey lovers
container: whiskey glass
ingredients:
  whiskey: 60 ml
  simple syrup: 15 ml
  angostura bitters: 4 dashes
instructions:
  - (Optional) Substitute simple syrup with maple syrup for flavoured variation
  - Add all ingredients with ice in shaker
  - Stir gently until well mixed and chilled
  - Strain mix over ice in whiskey glass
  - (Optional) Use sphere or oversized ice cube
  - (Optional) Add orange slice or peel for a citrus twist
tags:
  - classic
  - smokey